<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex布局</title>
    <style>
        .container{
            display: flex;
            flex-direction: row; /*default main axis direction*/;
            border: 3px solid rgb(5, 188, 255);
            justify-content: center; /*main axis alignment*/;
            align-items: center; /*cross axis alignment*/;
            height: 200px;
            width: 130px;
            flex-wrap: wrap; /*allow items to wrap to the next line when they exceed the container width*/;
            align-content: center; /*align wrapped lines in the container*/;
        }
        .item{
            background-color: aqua;
            border: 1px solid black;
            width: 50px;
            height: 50px;
        }
    </style>
</head>
<body class="container">
    <div class="item">1</div>
    <div class="item">2</div>
    <div class="item">3</div>
    <div class="item">4</div>
    <div class="item">5</div>
</body>
</html>
