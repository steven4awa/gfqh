<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>双重导航栏</title>

        <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/common.css">

     <!-- font icon:  https://fontawesome.com/ -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- jquery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
    <div class="content">
            <div class="content-center">
                <!-- 产品类型 -->
                <div class="filter-item">
                    <span class="filter-label">产品类型：</span>
                    <div class="filter-buttons">
                        <button class="filter-btn active">全部</button>
                        <button class="filter-btn">股票</button>
                        <button class="filter-btn">指数</button>
                        <button class="filter-btn">混合</button>
                        <button class="filter-btn">债券</button>
                        <button class="filter-btn">FOF</button>
                        <button class="filter-btn">货币</button>
                        <button class="filter-btn">QDII</button>
                    </div>
                </div>

                <!-- 风险等级 -->
                <div class="filter-item">
                    <span class="filter-label">风险等级：</span>
                    <div class="filter-buttons">
                        <button class="filter-btn active">全部</button>
                        <button class="filter-btn">低风险</button>
                        <button class="filter-btn">中低风险</button>
                        <button class="filter-btn">中风险</button>
                        <button class="filter-btn">中高风险</button>
                        <button class="filter-btn">高风险</button>
                    </div>
                </div>
            </div>
        </div>
</body>
</html>
